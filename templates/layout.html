<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #0f1115; color: #e2e8f0; }
    .navbar { background: #111827; }
    .card { background: #111827; border: 1px solid #1f2937; }
    .btn-primary { background: #2563eb; border-color: #1d4ed8; }
    .btn-danger { background: #dc2626; border-color: #b91c1c; }
    .btn-success { background: #16a34a; border-color: #15803d; }
    a, .link { color: #60a5fa; }
    textarea, input, select { background:#0b0e13; color:#e2e8f0; border:1px solid #1f2937; }
    .footer { color: #64748b; font-size: 12px; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark mb-4">
  <div class="container-fluid"><span class="navbar-brand mb-0 h1">{{ title }}</span></div>
</nav>
<div class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for cat, msg in messages %}
      <div class="alert alert-warning">{{ msg }}</div>
    {% endfor %}
  {% endif %}
  {% endwith %}
  {% block body %}{% endblock %}
  <div class="footer mt-5 mb-3">WAVE Control Panel</div>
</div>
</body>
</html>
